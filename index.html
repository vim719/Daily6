<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALPHA PULSE | New York</title>
    <style>
        :root {
            /* 4 Vibrant High-Energy Gradients */
            --color-1: linear-gradient(-45deg, #f093fb, #f5576c, #ff0844);
            --color-2: linear-gradient(-45deg, #4facfe, #00f2fe, #38f9d7);
            --color-3: linear-gradient(-45deg, #667eea, #764ba2, #6B8DD6);
            --color-4: linear-gradient(-45deg, #11998e, #38ef7d, #00b09b);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex; flex-direction: column;
            background-size: 400% 400% !important;
            animation: gradientBG 10s ease infinite;
            transition: background 1.5s ease-in-out;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* HUD - Top Section */
        .hud {
            padding: 25px; display: flex; justify-content: space-between; align-items: flex-start;
            font-family: 'Segoe UI', sans-serif; font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase;
            font-size: clamp(0.8rem, 2.5vw, 1.1rem);
        }

        /* Stage - Center Section */
        .stage {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 20px; text-align: center;
        }

        #booster {
            font-size: 18vw;
            line-height: 0.85;
            text-shadow: 0 10px 40px rgba(0,0,0,0.3);
            cursor: pointer;
            user-select: none;
        }

        /* Footer - Brand Message */
        footer {
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            font-size: clamp(0.6rem, 2vw, 0.9rem);
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            text-align: center;
            background: rgba(0,0,0,0.1);
        }

        .fade-in { animation: fadeInMsg 0.6s ease-out; }
        @keyframes fadeInMsg {
            from { opacity: 0; transform: scale(0.9); filter: blur(8px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        @media (min-width: 1000px) { #booster { font-size: 11rem; } }
    </style>
</head>
<body>

    <div class="hud">
        <div id="date-info">SAT, MAR 21</div>
        <div style="text-align: right;">
            <div id="city-name">NEW YORK</div>
            <div id="clock" style="font-size: 1.5rem; margin-top: 5px;">00:00</div>
        </div>
    </div>

    <div class="stage">
        <div id="booster" class="fade-in">
            ALPHA<br>ENERGY<br>NOW
        </div>
    </div>

    <footer>
        Alpha Words for The Ultimate Success for the Entrepreneurs in every 6 minutes
    </footer>

    <script>
        const Actions = ["BUILD", "SCALE", "ATTACK", "WIN", "LEAD", "FOCUS", "EXECUTE", "GRIND", "DOMINATE"];
        const Targets = ["YOUR", "THE", "PURE", "REAL", "TOTAL", "EVERY"];
        const Outcomes = ["EMPIRE", "LEGACY", "VISION", "PROFIT", "RESULTS", "FUTURE", "VICTORY"];

        function triggerNewPhrase() {
            const el = document.getElementById('booster');
            const a = Actions[Math.floor(Math.random() * Actions.length)];
            const t = Targets[Math.floor(Math.random() * Targets.length)];
            const o = Outcomes[Math.floor(Math.random() * Outcomes.length)];
            
            el.classList.remove('fade-in');
            void el.offsetWidth; 
            el.innerHTML = Math.random() > 0.3 ? `${a}<br>${t}<br>${o}` : `${a} ${t} ${o}`;
            el.classList.add('fade-in');
        }

        function updatePulse() {
            const now = new Date();
            const mins = now.getMinutes();
            const secs = now.getSeconds();

            // 1. Every 6 Minutes Color Transition Logic
            // Cycles through 4 colors based on (Minutes / 6)
            const colorIndex = Math.floor(mins / 6) % 4;
            const gradients = ["var(--color-1)", "var(--color-2)", "var(--color-3)", "var(--color-4)"];
            document.body.style.background = gradients[colorIndex];

            // 2. HUD Updates
            document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date-info').textContent = now.toLocaleDateString([], {weekday: 'short', month: 'short', day: 'numeric'});

            // 3. New Alpha Phrase every 6 minutes (at :00, :06, :12, etc.)
            if (mins % 6 === 0 && secs === 0) {
                triggerNewPhrase();
            }
        }

        // Manual override for instant boost
        document.getElementById('booster').onclick = triggerNewPhrase;

        // Start engine
        setInterval(updatePulse, 1000);
        updatePulse();
        triggerNewPhrase();
    </script>
</body>
</html>
