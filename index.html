<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ALPHA PULSE | New York</title>
  <style>
    :root {
      /* 4 Vibrant High-Energy Gradients */
      --color-1: linear-gradient(-45deg, #f093fb, #f5576c, #ff0844);
      --color-2: linear-gradient(-45deg, #4facfe, #00f2fe, #38f9d7);
      --color-3: linear-gradient(-45deg, #667eea, #764ba2, #6B8DD6);
      --color-4: linear-gradient(-45deg, #11998e, #38ef7d, #00b09b);
    }

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; font-family: 'Impact', 'Arial Black', sans-serif;
      display: flex; flex-direction: column;
      background-size: 400% 400% !important;
      animation: gradientBG 10s ease infinite;
      transition: background 1.5s ease-in-out;
      color: white;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* HUD - Top Section */
    .hud {
      padding: 25px; display: flex; justify-content: space-between; align-items: flex-start;
      font-family: 'Segoe UI', sans-serif; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      font-size: clamp(0.8rem, 2.5vw, 1.1rem);
      user-select: none;
    }

    #date-info {
      user-select: none;
    }

    #city-time {
      text-align: right;
      user-select: none;
    }

    #city-name {
      font-family: 'Segoe UI', sans-serif;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 1rem;
      user-select: none;
    }

    #clock {
      font-family: 'Segoe UI', sans-serif;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 1.5rem;
      margin-top: 5px;
      user-select: none;
    }

    /* Stage - Center Section */
    .stage {
      flex: 1; display: flex; justify-content: center; align-items: center;
      padding: 20px; text-align: center;
    }

    #booster {
      font-size: 18vw;
      line-height: 0.85;
      text-shadow: 0 10px 40px rgba(0,0,0,0.3);
      cursor: pointer;
      user-select: none;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @media (min-width: 1000px) {
      #booster {
        font-size: 11rem;
      }
    }

    /* Footer - Brand Message */
    footer {
      padding: 20px;
      font-family: 'Segoe UI', sans-serif;
      font-size: clamp(0.6rem, 2vw, 0.9rem);
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
      text-align: center;
      background: rgba(0,0,0,0.1);
      user-select: none;
    }

    .fade-in {
      animation: fadeInMsg 0.6s ease-out;
    }

    @keyframes fadeInMsg {
      from {
        opacity: 0;
        transform: scale(0.9);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    /* City prompt overlay */
    #city-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      user-select: none;
    }

    #city-prompt {
      background: #222;
      padding: 30px 40px;
      border-radius: 12px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    #city-prompt h2 {
      margin-top: 0;
      font-weight: 700;
      font-size: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 15px;
    }

    #city-input {
      width: 100%;
      padding: 12px 15px;
      font-size: 1rem;
      border-radius: 8px;
      border: none;
      outline: none;
      margin-bottom: 15px;
      font-weight: 600;
      text-transform: capitalize;
    }

    #city-submit {
      background: #38f9d7;
      border: none;
      padding: 12px 20px;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      color: #000;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: background 0.3s ease;
    }

    #city-submit:hover {
      background: #00f2fe;
    }

    #city-error {
      color: #ff6b6b;
      margin-top: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>

  <div class="hud">
    <div id="date-info">SUN, MAR 22</div>
    <div id="city-time">
      <div id="city-name">NEW YORK</div>
      <div id="clock">11:42 AM</div>
    </div>
  </div>

  <div class="stage">
    <div id="booster" class="fade-in">ALPHA<br>ENERGY<br>NOW</div>
  </div>

  <footer>
    Alpha Words for The Ultimate Success for the Entrepreneurs in every 6 minutes
  </footer>

  <div id="city-overlay" aria-modal="true" role="dialog" aria-labelledby="city-prompt-title" style="display:none;">
    <div id="city-prompt">
      <h2 id="city-prompt-title">What city are you in now?</h2>
      <input type="text" id="city-input" placeholder="Enter your city name" autocomplete="off" />
      <button id="city-submit">Submit</button>
      <div id="city-error"></div>
    </div>
  </div>

  <script>
    // Original motivational words from your codebase
    const Actions = ["BUILD", "SCALE", "ATTACK", "WIN", "LEAD", "FOCUS", "EXECUTE", "GRIND", "DOMINATE"];
    const Targets = ["YOUR", "THE", "PURE", "REAL", "TOTAL", "EVERY"];
    const Outcomes = ["EMPIRE", "LEGACY", "VISION", "PROFIT", "RESULTS", "FUTURE", "VICTORY"];

    const gradients = [
      "var(--color-1)",
      "var(--color-2)",
      "var(--color-3)",
      "var(--color-4)"
    ];

    const boosterEl = document.getElementById('booster');
    const dateInfoEl = document.getElementById('date-info');
    const cityNameEl = document.getElementById('city-name');
    const clockEl = document.getElementById('clock');
    const cityOverlay = document.getElementById('city-overlay');
    const cityInput = document.getElementById('city-input');
    const citySubmit = document.getElementById('city-submit');
    const cityError = document.getElementById('city-error');

    // City to timezone mapping (simple curated list)
    const CITY_TO_TZ = {
      "new york": "America/New_York",
      "los angeles": "America/Los_Angeles",
      "chicago": "America/Chicago",
      "houston": "America/Chicago",
      "miami": "America/New_York",
      "london": "Europe/London",
      "paris": "Europe/Paris",
      "berlin": "Europe/Berlin",
      "dubai": "Asia/Dubai",
      "singapore": "Asia/Singapore",
      "hong kong": "Asia/Hong_Kong",
      "tokyo": "Asia/Tokyo",
      "seoul": "Asia/Seoul",
      "ho chi minh city": "Asia/Ho_Chi_Minh",
      "hanoi": "Asia/Ho_Chi_Minh",
      "sydney": "Australia/Sydney",
      "melbourne": "Australia/Melbourne"
    };

    let userTimeZone = null;
    let userCity = null;

    // Utility: format date/time in given timezone
    function formatInTimeZone(date, timeZone, options) {
      return new Intl.DateTimeFormat('en-US', { timeZone, ...options }).format(date);
    }

    // Show city prompt overlay
    function showCityPrompt() {
      cityOverlay.style.display = 'flex';
      cityInput.value = '';
      cityError.textContent = '';
      cityInput.focus();
    }

    // Hide city prompt overlay
    function hideCityPrompt() {
      cityOverlay.style.display = 'none';
    }

    // Validate city input and set timezone
    function setCity(cityRaw) {
      const city = cityRaw.trim().toLowerCase();
      if (!city) {
        cityError.textContent = 'Please enter a city name.';
        return false;
      }
      if (!(city in CITY_TO_TZ)) {
        cityError.textContent = 'City not recognized. Try a major city like New York or London.';
        return false;
      }
      userCity = cityRaw.trim();
      userTimeZone = CITY_TO_TZ[city];
      localStorage.setItem('alphaPulseCity', userCity);
      localStorage.setItem('alphaPulseTimeZone', userTimeZone);
      hideCityPrompt();
      updateTimeAndDate();
      return true;
    }

    // Load city/timezone from localStorage or prompt
    function initCityAndTimeZone() {
      const storedCity = localStorage.getItem('alphaPulseCity');
      const storedTZ = localStorage.getItem('alphaPulseTimeZone');
      if (storedCity && storedTZ) {
        userCity = storedCity;
        userTimeZone = storedTZ;
        updateTimeAndDate();
      } else {
        showCityPrompt();
      }
    }

    // Update date, city, time display
    function updateTimeAndDate() {
      const now = new Date();
      const tz = userTimeZone || Intl.DateTimeFormat().resolvedOptions().timeZone;
      const cityDisplay = userCity || 'Your City';

      const dateStr = formatInTimeZone(now, tz, { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
      const timeStr = formatInTimeZone(now, tz, { hour: 'numeric', minute: '2-digit', hour12: true }).toUpperCase();

      dateInfoEl.textContent = dateStr;
      cityNameEl.textContent = cityDisplay.toUpperCase();
      clockEl.textContent = timeStr;
    }

    // Generate new phrase
    function triggerNewPhrase() {
      const a = Actions[Math.floor(Math.random() * Actions.length)];
      const t = Targets[Math.floor(Math.random() * Targets.length)];
      const o = Outcomes[Math.floor(Math.random() * Outcomes.length)];

      boosterEl.classList.remove('fade-in');
      void boosterEl.offsetWidth; // trigger reflow
      boosterEl.innerHTML = `${a}<br>${t}<br>${o}`;
      boosterEl.classList.add('fade-in');
    }

    // Update background gradient every minute
    function updateBackgroundGradient() {
      const now = new Date();
      const mins = now.getMinutes();
      // Cycle every minute through 4 gradients
      const index = mins % gradients.length;
      document.body.style.background = gradients[index];
    }

    // Main update loop: update time, background, phrase
    let lastPhraseMinute = null;
    function mainUpdate() {
      const now = new Date();
      const mins = now.getMinutes();
      const secs = now.getSeconds();

      updateTimeAndDate();
      updateBackgroundGradient();

      // Update phrase every 6 minutes at :00 seconds
      if (mins % 6 === 0 && secs === 0 && lastPhraseMinute !== mins) {
        triggerNewPhrase();
        lastPhraseMinute = mins;
      }
    }

    // Manual phrase override on click
    boosterEl.addEventListener('click', () => {
      triggerNewPhrase();
    });

    // City prompt submit
    citySubmit.addEventListener('click', () => {
      setCity(cityInput.value);
    });

    cityInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        setCity(cityInput.value);
      }
    });

    // Initialize app
    window.addEventListener('DOMContentLoaded', () => {
      initCityAndTimeZone();
      triggerNewPhrase();
      mainUpdate();
      setInterval(mainUpdate, 1000);
    });
  </script>
</body>
</html>
